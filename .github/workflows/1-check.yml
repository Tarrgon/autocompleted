name: 1. Check

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/run-checks.yml

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .
